<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pre-NMC Trial Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="quiz-container">
    <h1>Pre-NMC Trial Quiz</h1>
    <p id="course-title">Medical Nursing Practice Questions</p>
    <div id="timer">Time Left: 180:00</div>

    <div id="quiz-box">
      <h2 id="question-number"></h2>
      <p id="question-text"></p>

      <div id="options"></div>

      <div class="buttons">
        <button id="prev-btn">Previous</button>
        <button id="next-btn">Next</button>
        <button id="submit-btn">Submit Quiz</button>
      </div>
    </div>

    <div id="result-box" class="hidden">
      <h2>Your Score</h2>
      <p id="score-text"></p>
      <button onclick="reviewAnswers()">Review Answers</button>
    </div>

    <div id="review-box" class="hidden"></div>
  </div>

  <script src="questions.js"></script>
  <script src="script.js"></script>
</body>
</html>
